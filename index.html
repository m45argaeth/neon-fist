<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>NEON FIST — HTML5 Fighting Game</title>
<style>
  :root{ --neon:#00e5ff; --neon2:#ff2e88; --bg:#05060f; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; background:var(--bg); color:#fff;
    font-family:'Trebuchet MS',Segoe UI,system-ui,sans-serif; overflow:hidden;
    -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
  #wrap{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas{ background:#000; box-shadow:0 0 60px rgba(0,229,255,.25),0 0 120px rgba(255,46,136,.15);
    border:2px solid rgba(0,229,255,.4); border-radius:10px; max-width:100%; max-height:100%; touch-action:none; }
  #hint{ position:fixed; bottom:10px; left:0; right:0; text-align:center; font-size:13px;
    color:#7fdfff; letter-spacing:1px; opacity:.85; text-shadow:0 0 8px rgba(0,229,255,.6); }
  #hint b{ color:#fff; }

  /* ---- mobile touch controls ---- */
  #touch{ display:none; }
  body.touch #touch{ display:block; }
  body.touch #hint{ display:none; }
  #touch .pad{ position:fixed; bottom:16px; display:flex; gap:12px; z-index:10; align-items:flex-end; }
  #touch .left{ left:16px; }
  #touch .right{ right:16px; flex-wrap:wrap-reverse; width:212px; justify-content:flex-end; }
  #touch button{ touch-action:none; -webkit-user-select:none; user-select:none;
    width:62px; height:62px; border-radius:50%; font-size:13px; font-weight:bold; color:#fff;
    background:rgba(0,229,255,.12); border:2px solid rgba(0,229,255,.6);
    text-shadow:0 0 6px #00e5ff; box-shadow:0 0 14px rgba(0,229,255,.25); }
  #touch .right button{ background:rgba(255,46,136,.14); border-color:rgba(255,46,136,.6);
    text-shadow:0 0 6px #ff2e88; box-shadow:0 0 14px rgba(255,46,136,.25); }
  #touch button.on{ background:rgba(255,255,255,.4); transform:scale(.94); }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
<div id="hint">P1: <b>A/D</b> move · <b>W</b> jump · <b>S</b> block · <b>F</b> punch · <b>G</b> kick · <b>H</b> hadouken &nbsp;|&nbsp; P2/CPU: <b>Arrows</b> · <b>K/L/;</b> &nbsp;|&nbsp; <b>Enter</b> start · <b>T</b> toggle 2P</div>

<div id="touch">
  <div class="pad left">
    <button data-k="KeyA" aria-label="left">◀</button>
    <button data-k="KeyD" aria-label="right">▶</button>
  </div>
  <div class="pad right">
    <button data-k="KeyW">JUMP</button>
    <button data-k="KeyS">BLOCK</button>
    <button data-k="KeyF">PUN</button>
    <button data-k="KeyG">KICK</button>
    <button data-k="KeyH">SP</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
