<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEON FIST — HTML5 Fighting Game</title>
<style>
  :root{ --neon:#00e5ff; --neon2:#ff2e88; --bg:#05060f; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; background:var(--bg); color:#fff;
    font-family:'Trebuchet MS',Segoe UI,system-ui,sans-serif; overflow:hidden; }
  #wrap{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas{ background:#000; box-shadow:0 0 60px rgba(0,229,255,.25),0 0 120px rgba(255,46,136,.15);
    border:2px solid rgba(0,229,255,.4); border-radius:10px; max-width:100%; max-height:100%; image-rendering:pixelated; }
  #hint{ position:fixed; bottom:10px; left:0; right:0; text-align:center; font-size:13px;
    color:#7fdfff; letter-spacing:1px; opacity:.85; text-shadow:0 0 8px rgba(0,229,255,.6); }
  #hint b{ color:#fff; }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
<div id="hint">P1: <b>A/D</b> move · <b>W</b> jump · <b>S</b> block · <b>F</b> punch · <b>G</b> kick · <b>H</b> hadouken &nbsp;|&nbsp; P2/CPU: <b>Arrows</b> · <b>K/L/;</b> &nbsp;|&nbsp; <b>Enter</b> start · <b>T</b> toggle 2P</div>
<script src="game.js"></script>
</body>
</html>
