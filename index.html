<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>NEON FIST — Pixel Fighting Game</title>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; background:#05060f; color:#fff;
    font-family:'Courier New',monospace; overflow:hidden;
    -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
  #wrap{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas{ background:#000; image-rendering:pixelated; image-rendering:crisp-edges;
    box-shadow:0 0 50px rgba(0,229,255,.3),0 0 110px rgba(255,46,136,.18);
    border:3px solid rgba(0,229,255,.45); border-radius:6px;
    width:min(100vw,177.7vh); height:auto; aspect-ratio:16/9; touch-action:none; }
  #mute{ position:fixed; top:12px; right:12px; z-index:20; width:42px; height:42px; border-radius:8px;
    background:rgba(0,0,0,.45); border:2px solid rgba(0,229,255,.5); color:#fff; font-size:18px;
    cursor:pointer; backdrop-filter:blur(2px); }
  #hint{ position:fixed; bottom:8px; left:0; right:0; text-align:center; font-size:12px;
    color:#7fdfff; letter-spacing:1px; opacity:.85; text-shadow:0 0 8px rgba(0,229,255,.6); }
  #hint b{ color:#fff; }
  /* ---- mobile touch controls ---- */
  #touch{ display:none; }
  body.touch #touch{ display:block; }
  body.touch #hint{ display:none; }
  #touch .pad{ position:fixed; bottom:16px; display:flex; gap:12px; z-index:10; align-items:flex-end; }
  #touch .left{ left:16px; }
  #touch .right{ right:16px; flex-wrap:wrap-reverse; width:212px; justify-content:flex-end; }
  #touch button{ touch-action:none; -webkit-user-select:none; user-select:none;
    width:62px; height:62px; border-radius:50%; font-size:13px; font-weight:bold; color:#fff;
    background:rgba(0,229,255,.12); border:2px solid rgba(0,229,255,.6);
    text-shadow:0 0 6px #00e5ff; box-shadow:0 0 14px rgba(0,229,255,.25); }
  #touch .right button{ background:rgba(255,46,136,.14); border-color:rgba(255,46,136,.6);
    text-shadow:0 0 6px #ff2e88; box-shadow:0 0 14px rgba(255,46,136,.25); }
  #touch button.on{ background:rgba(255,255,255,.4); transform:scale(.94); }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="480" height="270"></canvas></div>
<button id="mute" aria-label="mute">🔊</button>
<div id="hint">P1: <b>A/D</b> move · <b>W</b> jump · <b>S</b> block · <b>F</b> punch · <b>G</b> kick · <b>H</b> special &nbsp;|&nbsp; P2: <b>Arrows</b> · <b>K/L/;</b> &nbsp;|&nbsp; <b>Enter</b> ok · <b>T</b> 2P · <b>M</b> mute</div>

<div id="touch">
  <div class="pad left">
    <button data-k="KeyA" aria-label="left">◀</button>
    <button data-k="KeyD" aria-label="right">▶</button>
  </div>
  <div class="pad right">
    <button data-k="KeyW">JUMP</button>
    <button data-k="KeyS">BLOCK</button>
    <button data-k="KeyF">PUN</button>
    <button data-k="KeyG">KICK</button>
    <button data-k="KeyH">SP</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
